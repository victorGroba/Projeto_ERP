services:
  app:
    build: .
    container_name: ca-bi-dashboard
    restart: unless-stopped
    ports:
      # Porta externa (host) : porta interna (container).
      # Externa 3031 para não conflitar com a 3001 (já em uso na VPS).
      # No reverse proxy, aponte o domínio para localhost:3031.
      - "3031:3001"
    env_file:
      - ./backend/.env
    environment:
      # Banco SQLite no volume persistente (sobrescreve o DATABASE_URL do .env)
      - DATABASE_URL=file:/app/data/prod.db
      - NODE_ENV=production
      - PORT=3001
      # Admin inicial criado no primeiro start (troque a senha!)
      - ADMIN_EMAIL=admin@labmattos.com.br
      - ADMIN_PASSWORD=troque-esta-senha
    volumes:
      - ca-bi-data:/app/data

volumes:
  ca-bi-data:
